<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب اشجار وشجيرات لعبة هاي داي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(240, 247, 244, 0.8), rgba(240, 247, 244, 0.8)), url('image_1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .app-container {
            width: 100%;
            max-width: 550px;
            background: rgba(253, 248, 238, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            border: 2px solid #e0d4c3;
        }

        .app-header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid #4caf50;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .user-info-wrapper {
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .gold-decorative-name {
            font-family: 'Reem Kufi', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to bottom, #cf9b33 0%, #feea90 26%, #d7a032 60%, #ffeb94 80%, #d59f31 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            margin: 0;
        }

        .small-user-id {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #8d7d6a;
            display: block;
        }

        .app-title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 {
            color: #2e7d32;
            font-size: 18px;
            margin: 0;
            font-weight: 700;
        }
        
        .main-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .main-btn:hover {
            background-color: #388e3c;
        }

        .plant-list {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            border: 2px solid #e0d4c3;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.7);
        }

        .plant-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .plant-card:hover {
            background: #e8f5e9;
            border-color: #4caf50;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .plant-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 8px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.15));
        }

        /* تنسيق الإيموجي الاحتياطي في حال كان اسم الصورة خطأ */
        .fallback-emoji {
            font-size: 40px;
            line-height: 60px;
            display: none;
        }

        .plant-name {
            font-size: 12px;
            font-weight: bold;
            color: #444;
        }

        .calculator-section {
            display: none;
            margin-top: 15px;
            padding: 20px;
            border-radius: 10px;
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
            text-align: center;
        }

        .selected-plant-display img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.2));
        }
        
        .selected-plant-display .fallback-emoji {
            font-size: 70px;
            line-height: 90px;
        }

        .selected-plant-display h2 {
            margin: 10px 0;
            color: #1b5e20;
            font-size: 22px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px 10px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            border: 1px dashed #a5d6a7;
            font-weight: bold;
        }
        .info-grid div {
            text-align: center;
            background-color: #f9fbe7;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #f0f4c3;
        }

        .info-value {
            display: block;
            color: #d32f2f;
            font-size: 16px;
            margin-top: 5px;
        }
        .star-value { color: #f57f17; }

        .input-group {
            margin-bottom: 20px;
            margin-top: 20px;
        }
        .input-group input {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #81c784;
            border-radius: 8px;
            outline: none;
            background-color: #fff;
        }
        .input-group input:focus {
            border-color: #388e3c;
        }

        .results {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            background-color: #fff8e1;
            border: 2px solid #ffe082;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            font-size: 17px;
            margin-bottom: 15px;
            font-weight: bold;
            padding-bottom: 8px;
            border-bottom: 1px dashed #ffe082;
        }
        .result-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .cost-text { color: #d32f2f; }
        .revenue-text { color: #2e7d32; }
        .stars-text { color: #f57f17; }
        .profit-text { 
            color: #1565c0; 
            border-top: 2px solid #ffb74d; 
            padding-top: 15px;
            margin-top: 5px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header-container">
        <div class="user-info-wrapper">
            <div class="gold-decorative-name">أسير الذكريات</div>
            <span class="small-user-id">hamoody hamoody</span>
        </div>
        <div class="app-title-wrapper">
            <h1>حساب اشجار وشجيرات لعبة هاي داي</h1>
        </div>
    </div>
    
    <button class="main-btn" onclick="toggleMenu()">🪴 اختر الشجرة / الشجيرة من هنا</button>

    <div class="plant-list" id="plantList"></div>

    <div class="calculator-section" id="calcSection">
        <div class="selected-plant-display">
            <img id="selectedImg" src="" alt="صورة النبتة" onerror="showFallback(this, 'selectedFallback')">
            <span id="selectedFallback" class="fallback-emoji"></span>
            <h2 id="selectedName"></h2>
            
            <div class="info-grid">
                <div>🌱 سعر النبتة: <span class="info-value"><span id="infoCost"></span> 🪙</span></div>
                <div>⏳ وقت النمو: <span class="info-value" id="infoTime"></span></div>
                <div>💰 سعر الثمرة: <span class="info-value"><span id="infoPrice"></span> 🪙</span></div>
                <div>⭐ نجوم الثمرة: <span class="info-value star-value"><span id="infoXp"></span> 🌟</span></div>
            </div>
        </div>

        <div class="input-group">
            <input type="number" id="plantQuantity" placeholder="أدخل عدد الأشجار..." min="1">
        </div>
        <button class="main-btn" style="background-color: #1976d2;" onclick="calculate()">🧮 حساب الآن</button>
    </div>

    <div class="results" id="resultsSection">
        <div class="result-row cost-text">
            <span>التكلفة الكلية للشراء:</span>
            <span id="totalCost">0 🪙</span>
        </div>
        <div class="result-row revenue-text">
            <span>العائد الكلي من البيع:</span>
            <span id="totalRevenue">0 🪙</span>
        </div>
        <div class="result-row stars-text">
            <span>إجمالي النجوم المتوقعة:</span>
            <span id="totalStars">0 🌟</span>
        </div>
        <div class="result-row profit-text">
            <span>صافي الربح المتوقع:</span>
            <span id="netProfit">0 🪙</span>
        </div>
    </div>
</div>

<script>
    // اسم المجلد الذي قمت بإنشائه بجانب ملف التطبيق
    const localFolder = "Tree images/";
    
    // أسماء الصور العربية (تأكد أنها متطابقة مع الملفات الموجودة في المجلد)
    const plants = [
        { id: 0, name: 'شجرة التفاح', img: 'تفاح.png', emoji: '🍎', cost: 160, time: '16 ساعة', price: 39, xp: 7 },
        { id: 1, name: 'شجيرة التوت', img: 'توت.png', emoji: '🍓', cost: 220, time: '18 ساعة', price: 46, xp: 9 },
        { id: 2, name: 'شجرة الكرز', img: 'كرز.png', emoji: '🍒', cost: 410, time: 'يوم واحد و 3 ساعات', price: 68, xp: 13 },
        { id: 3, name: 'شجيرة التوت الأسود', img: 'توت اسود.png', emoji: '🫐', cost: 530, time: 'يوم واحد و 8 ساعات', price: 82, xp: 16 },
        { id: 4, name: 'شجيرة التوت الأزرق', img: 'توت ازرق.png', emoji: '🫐', cost: 550, time: 'يوم واحد و 10 ساعات', price: 82, xp: 16 },
        { id: 5, name: 'شجرة الكاكاو', img: 'كاكاو.png', emoji: '🍫', cost: 550, time: 'يوم واحد و 11 ساعة', price: 86, xp: 16 },
        { id: 6, name: 'شجيرة البن', img: 'بن.png', emoji: '☕', cost: 375, time: 'يوم واحد', price: 64, xp: 12 },
        { id: 7, name: 'شجرة الزيتون', img: 'زيتون.png', emoji: '🫒', cost: 620, time: 'يوم واحد', price: 82, xp: 17 },
        { id: 8, name: 'شجرة الليمون', img: 'ليمون.png', emoji: '🍋', cost: 670, time: 'يوم واحد و 5 ساعات', price: 93, xp: 18 },
        { id: 9, name: 'شجرة البرتقال', img: 'برتقال.png', emoji: '🍊', cost: 720, time: 'يوم واحد و 8 ساعات', price: 97, xp: 19 },
        { id: 10, name: 'شجرة الخوخ', img: 'خوخ.png', emoji: '🍑', cost: 750, time: 'يوم واحد و 7 ساعات', price: 100, xp: 20 },
        { id: 11, name: 'شجرة الموز', img: 'موز.png', emoji: '🍌', cost: 800, time: 'يوم واحد و 6 ساعات', price: 104, xp: 20 },
        { id: 12, name: 'شجرة البرقوق', img: 'برقوق.png', emoji: '🟣', cost: 600, time: 'يوم واحد و ساعة واحدة', price: 82, xp: 16 },
        { id: 13, name: 'شجرة المانجو', img: 'مانجو.png', emoji: '🥭', cost: 770, time: 'يوم واحد و 8 ساعات', price: 100, xp: 20 },
        { id: 14, name: 'شجرة جوز الهند', img: 'جوز هند.png', emoji: '🥥', cost: 810, time: 'يوم واحد و 12 ساعة', price: 108, xp: 21 },
        { id: 15, name: 'شجرة الجوافة', img: 'جوافة.png', emoji: '🍐', cost: 860, time: 'يوم واحد و 3 ساعات', price: 111, xp: 22 },
        { id: 16, name: 'شجرة الرمان', img: 'رمان.png', emoji: '🍎', cost: 910, time: 'يوم واحد و 3 ساعات', price: 111, xp: 22 }
    ];

    let selectedPlant = null;
    const listDiv = document.getElementById('plantList');

    // دالة لاستبدال الصورة في حال لم يكن الاسم متطابقاً مع اسم الملف
    function showFallback(imgElement, fallbackId) {
        imgElement.style.display = 'none';
        document.getElementById(fallbackId).style.display = 'block';
    }

    // توليد القائمة بدمج اسم المجلد مع اسم الصورة
    plants.forEach(p => {
        const div = document.createElement('div');
        div.className = 'plant-card';
        const fallbackId = `fallback_${p.id}`;
        div.innerHTML = `<img class="plant-img" src="${localFolder}${p.img}" alt="${p.name}" onerror="showFallback(this, '${fallbackId}')">
                         <span id="${fallbackId}" class="fallback-emoji">${p.emoji}</span>
                         <div class="plant-name">${p.name}</div>`;
        div.onclick = () => selectPlant(p.id);
        listDiv.appendChild(div);
    });

    function toggleMenu() {
        listDiv.style.display = listDiv.style.display === 'grid' ? 'none' : 'grid';
        document.getElementById('calcSection').style.display = 'none';
        document.getElementById('resultsSection').style.display = 'none';
    }

    function selectPlant(id) {
        selectedPlant = plants[id];
        listDiv.style.display = 'none';
        document.getElementById('calcSection').style.display = 'block';
        
        const imgElement = document.getElementById('selectedImg');
        const fallbackElement = document.getElementById('selectedFallback');
        
        // إعادة تعيين العرض للوضع الافتراضي قبل محاولة التحميل
        imgElement.style.display = 'inline-block';
        fallbackElement.style.display = 'none';
        
        // جلب الصورة من مجلدك المخصص
        imgElement.src = localFolder + selectedPlant.img;
        fallbackElement.innerText = selectedPlant.emoji;

        document.getElementById('selectedName').innerText = selectedPlant.name;
        document.getElementById('infoCost').innerText = selectedPlant.cost;
        document.getElementById('infoTime').innerText = selectedPlant.time;
        document.getElementById('infoPrice').innerText = selectedPlant.price;
        document.getElementById('infoXp').innerText = selectedPlant.xp;
    }

    function calculate() {
        const qtyInput = document.getElementById('plantQuantity');
        const qty = parseInt(qtyInput.value);
        if (!qty || qty <= 0) return alert('الرجاء إدخال عدد صحيح للأشجار!');
        
        // الحسابات الدقيقة (13 ثمرة لكل شجرة)
        const totalFruits = qty * 13;
        const cost = qty * selectedPlant.cost;
        const rev = totalFruits * selectedPlant.price;
        const stars = totalFruits * selectedPlant.xp;
        const profit = rev - cost;

        document.getElementById('totalCost').innerText = cost.toLocaleString() + ' 🪙';
        document.getElementById('totalRevenue').innerText = rev.toLocaleString() + ' 🪙';
        document.getElementById('totalStars').innerText = stars.toLocaleString() + ' 🌟';
        document.getElementById('netProfit').innerText = profit.toLocaleString() + ' 🪙';
        document.getElementById('resultsSection').style.display = 'block';
        
        qtyInput.blur(); // إخفاء لوحة المفاتيح
    }
</script>

</body>
</html>
