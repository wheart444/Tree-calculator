<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب اشجار وشجيرات لعبة هاي داي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* خلفية الصفحة: صورة المزرعة */
            background-image: linear-gradient(rgba(240, 247, 244, 0.8), rgba(240, 247, 244, 0.8)), url('image_1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .app-container {
            width: 100%;
            max-width: 550px;
            background: rgba(253, 248, 238, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            border: 2px solid #e0d4c3;
        }

        .app-header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid #4caf50;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .user-info-wrapper {
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .gold-decorative-name {
            font-family: 'Reem Kufi', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to bottom, #cf9b33 0%, #feea90 26%, #d7a032 60%, #ffeb94 80%, #d59f31 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            margin: 0;
        }

        .small-user-id {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #8d7d6a;
            display: block;
        }

        .app-title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 {
            color: #2e7d32;
            font-size: 18px;
            margin: 0;
            font-weight: 700;
        }
        
        .main-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .plant-list {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            border: 2px solid #e0d4c3;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.7);
        }

        .plant-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
        }

        .plant-img, .fallback-emoji {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 5px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .fallback-emoji {
            font-size: 40px;
            display: none;
        }

        .plant-name {
            font-size: 12px;
            font-weight: bold;
            color: #444;
        }

        .calculator-section {
            display: none;
            margin-top: 15px;
            padding: 20px;
            border-radius: 10px;
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
            text-align: center;
        }

        .selected-plant-display img {
            width: 85px;
            height: 85px;
            object-fit: contain;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            border: 1px dashed #a5d6a7;
        }

        .info-grid div {
            background-color: #f9fbe7;
            padding: 8px;
            border-radius: 6px;
        }

        .info-value {
            display: block;
            color: #d32f2f;
            font-size: 15px;
            font-weight: bold;
        }

        .star-value { color: #f57f17; }

        .input-group input {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #81c784;
            border-radius: 8px;
            margin: 15px 0;
        }

        .results {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #fff8e1;
            border: 2px solid #ffe082;
            border-radius: 10px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            padding: 8px 0;
            border-bottom: 1px dashed #ffe082;
        }

        .profit-text {
            color: #1565c0;
            border-top: 2px solid #ffb74d;
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header-container">
        <div class="user-info-wrapper">
            <div class="gold-decorative-name">أسير الذكريات</div>
            <span class="small-user-id">hamoody hamoody</span>
        </div>
        <div class="app-title-wrapper">
            <h1>حساب اشجار وشجيرات لعبة هاي داي</h1>
        </div>
    </div>
    
    <button class="main-btn" onclick="toggleMenu()">🪴 اختر الشجرة / الشجيرة من هنا</button>

    <div class="plant-list" id="plantList"></div>

    <div class="calculator-section" id="calcSection">
        <div class="selected-plant-display">
            <img id="selectedImg" src="" alt="">
            <span id="selectedFallback" class="fallback-emoji"></span>
            <h2 id="selectedName" style="color: #1b5e20;"></h2>
            
            <div class="info-grid">
                <div>🌱 سعر النبتة: <span class="info-value"><span id="infoCost"></span> 🪙</span></div>
                <div>⏳ وقت النمو: <span class="info-value" id="infoTime"></span></div>
                <div>💰 سعر الثمرة: <span class="info-value"><span id="infoPrice"></span> 🪙</span></div>
                <div>⭐ نجوم الثمرة: <span class="info-value star-value"><span id="infoXp"></span> 🌟</span></div>
            </div>
        </div>

        <div class="input-group">
            <input type="number" id="plantQuantity" placeholder="أدخل عدد الأشجار..." min="1">
        </div>
        <button class="main-btn" style="background-color: #1976d2;" onclick="calculate()">🧮 حساب الآن</button>
    </div>

    <div class="results" id="resultsSection">
        <div class="result-row" style="color:#d32f2f"><span>التكلفة الكلية:</span><span id="totalCost"></span></div>
        <div class="result-row" style="color:#2e7d32"><span>العائد الكلي:</span><span id="totalRevenue"></span></div>
        <div class="result-row" style="color:#f57f17"><span>النجوم الكلية:</span><span id="totalStars"></span></div>
        <div class="result-row profit-text"><span>صافي الربح:</span><span id="netProfit"></span></div>
    </div>
</div>

<script>
    // تم تحديث روابط الصور لتتطابق مع الموقع الرسمي
    const baseImg = "https://hayday.fandom.com/wiki/Special:FilePath/";
    
    const plants = [
        { id: 0, name: 'شجرة التفاح', img: 'Apple_Tree.png', emoji: '🍎', cost: 160, time: '16 ساعة', price: 39, xp: 7 },
        { id: 1, name: 'شجيرة التوت', img: 'Raspberry_Bush.png', emoji: '🍓', cost: 220, time: '18 ساعة', price: 46, xp: 9 },
        { id: 2, name: 'شجرة الكرز', img: 'Cherry_Tree.png', emoji: '🍒', cost: 410, time: 'يوم واحد و 3 ساعات', price: 68, xp: 13 },
        { id: 3, name: 'شجيرة التوت الأسود', img: 'Blackberry_Bush.png', emoji: '🫐', cost: 530, time: 'يوم واحد و 8 ساعات', price: 82, xp: 16 },
        { id: 4, name: 'شجيرة التوت الأزرق', img: 'Blueberry_Bush.png', emoji: '🫐', cost: 550, time: 'يوم واحد و 10 ساعات', price: 82, xp: 16 },
        { id: 5, name: 'شجرة الكاكاو', img: 'Cacao_Tree.png', emoji: '🍫', cost: 550, time: 'يوم واحد و 11 ساعة', price: 86, xp: 16 },
        { id: 6, name: 'شجيرة البن', img: 'Coffee_Bush.png', emoji: '☕', cost: 375, time: 'يوم واحد', price: 64, xp: 12 },
        { id: 7, name: 'شجرة الزيتون', img: 'Olive_Tree.png', emoji: '🫒', cost: 620, time: 'يوم واحد', price: 82, xp: 17 },
        { id: 8, name: 'شجرة الليمون', img: 'Lemon_Tree.png', emoji: '🍋', cost: 670, time: 'يوم واحد و 5 ساعات', price: 93, xp: 18 },
        { id: 9, name: 'شجرة البرتقال', img: 'Orange_Tree.png', emoji: '🍊', cost: 720, time: 'يوم واحد و 8 ساعات', price: 97, xp: 19 },
        { id: 10, name: 'شجرة الخوخ', img: 'Peach_Tree.png', emoji: '🍑', cost: 750, time: 'يوم واحد و 7 ساعات', price: 100, xp: 20 },
        { id: 11, name: 'شجرة الموز', img: 'Banana_Tree.png', emoji: '🍌', cost: 800, time: 'يوم واحد و 6 ساعات', price: 104, xp: 20 },
        { id: 12, name: 'شجرة البرقوق', img: 'Plum_Tree.png', emoji: '🍑', cost: 600, time: 'يوم واحد و ساعة واحدة', price: 82, xp: 16 },
        { id: 13, name: 'شجرة المانجو', img: 'Mango_Tree.png', emoji: '🥭', cost: 770, time: 'يوم واحد و 8 ساعات', price: 100, xp: 20 },
        { id: 14, name: 'شجرة جوز الهند', img: 'Coconut_Tree.png', emoji: '🥥', cost: 810, time: 'يوم واحد و 12 ساعة', price: 108, xp: 21 },
        { id: 15, name: 'شجرة الجوافة', img: 'Guava_Tree.png', emoji: '🍐', cost: 860, time: 'يوم واحد و 3 ساعات', price: 111, xp: 22 },
        { id: 16, name: 'شجرة الرمان', img: 'Pomegranate_Tree.png', emoji: '🍎', cost: 910, time: 'يوم واحد و 3 ساعات', price: 111, xp: 22 }
    ];

    let selectedPlant = null;

    function showFallback(img, fid) {
        img.style.display = 'none';
        document.getElementById(fid).style.display = 'block';
    }

    const listDiv = document.getElementById('plantList');
    plants.forEach(p => {
        const div = document.createElement('div');
        div.className = 'plant-card';
        const fid = `f_${p.id}`;
        div.innerHTML = `<img class="plant-img" src="${baseImg}${p.img}" onerror="showFallback(this, '${fid}')">
                         <span id="${fid}" class="fallback-emoji">${p.emoji}</span>
                         <div class="plant-name">${p.name}</div>`;
        div.onclick = () => selectPlant(p.id);
        listDiv.appendChild(div);
    });

    function toggleMenu() {
        listDiv.style.display = listDiv.style.display === 'grid' ? 'none' : 'grid';
        document.getElementById('calcSection').style.display = 'none';
        document.getElementById('resultsSection').style.display = 'none';
    }

    function selectPlant(id) {
        selectedPlant = plants[id];
        listDiv.style.display = 'none';
        document.getElementById('calcSection').style.display = 'block';
        document.getElementById('selectedImg').src = baseImg + selectedPlant.img;
        document.getElementById('selectedImg').style.display = 'inline-block';
        document.getElementById('selectedFallback').style.display = 'none';
        document.getElementById('selectedFallback').innerText = selectedPlant.emoji;
        document.getElementById('selectedName').innerText = selectedPlant.name;
        document.getElementById('infoCost').innerText = selectedPlant.cost;
        document.getElementById('infoTime').innerText = selectedPlant.time;
        document.getElementById('infoPrice').innerText = selectedPlant.price;
        document.getElementById('infoXp').innerText = selectedPlant.xp;
    }

    function calculate() {
        const qty = parseInt(document.getElementById('plantQuantity').value);
        if (!qty || qty <= 0) return alert('أدخل عدد صحيح');
        
        const totalFruits = qty * 13;
        const cost = qty * selectedPlant.cost;
        const rev = totalFruits * selectedPlant.price;
        const stars = totalFruits * selectedPlant.xp;
        const profit = rev - cost;

        document.getElementById('totalCost').innerText = cost.toLocaleString() + ' 🪙';
        document.getElementById('totalRevenue').innerText = rev.toLocaleString() + ' 🪙';
        document.getElementById('totalStars').innerText = stars.toLocaleString() + ' 🌟';
        document.getElementById('netProfit').innerText = profit.toLocaleString() + ' 🪙';
        document.getElementById('resultsSection').style.display = 'block';
    }
</script>

</body>
</html>
